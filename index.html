<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Maître — 30 Tage Französisch</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF8;--ink:#17120D;--rouge:#B8321E;--gold:#C9933A;
  --sage:#3A7A52;--violet:#6B52A8;--sky:#2471A3;
  --muted:#8A8075;--border:rgba(23,18,13,0.09);
  --card:#FFFFFF;--panel:#F2EDE4;--panel2:#EBF3EE;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-weight:300;background:var(--bg);color:var(--ink);}

/* ── PASSWORD SCREEN ── */
#pw-screen{
  position:fixed;inset:0;background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;flex-direction:column;gap:24px;
}
.pw-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:#FAFAF8;text-align:center;}
.pw-logo em{font-style:italic;color:var(--gold);}
.pw-sub{font-size:0.8rem;color:rgba(250,250,248,0.4);letter-spacing:0.12em;text-transform:uppercase;}
.pw-form{display:flex;flex-direction:column;gap:12px;width:280px;}
.pw-input{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;padding:13px 16px;color:#FAFAF8;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;
  transition:border-color 0.2s;letter-spacing:0.1em;text-align:center;
}
.pw-input:focus{border-color:rgba(255,255,255,0.4);}
.pw-input::placeholder{color:rgba(250,250,248,0.3);letter-spacing:0.05em;}
.pw-btn{
  background:var(--rouge);color:#fff;border:none;border-radius:6px;
  padding:13px;font-family:'DM Sans',sans-serif;font-size:0.78rem;
  letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;
}
.pw-btn:hover{background:#8f2010;}
.pw-error{font-size:0.75rem;color:#E07060;text-align:center;min-height:18px;}
#app-shell{display:none;height:100vh;flex-direction:column;overflow:hidden;}
#app-shell.visible{display:flex;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);background:rgba(250,250,248,0.97);flex-shrink:0;z-index:20;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.logo em{font-style:italic;color:var(--rouge);}
.top-mid{flex:1;max-width:300px;margin:0 auto;}
.prog-lbl{display:flex;justify-content:space-between;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rouge),var(--gold));border-radius:2px;transition:width 0.6s;}
.xp-pill{background:rgba(201,147,58,0.1);color:var(--gold);font-size:0.68rem;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px;letter-spacing:0.07em;}
.xp-pill b{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;}
.streak{background:rgba(184,50,30,0.08);color:var(--rouge);font-size:0.68rem;padding:4px 10px;border-radius:20px;}

/* ── LAYOUT ── */
.app{flex:1;display:flex;overflow:hidden;}
.sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:var(--card);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sb-head{padding:12px 14px 8px;font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.wk-lbl{font-size:0.55rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);padding:8px 14px 3px;opacity:0.65;}
.day-row{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background 0.12s;position:relative;}
.day-row:hover{background:var(--panel);}
.day-row.active{background:var(--panel);}
.day-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rouge);}
.day-row.locked{opacity:0.32;cursor:not-allowed;}
.day-num{width:25px;height:25px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:500;flex-shrink:0;transition:all 0.2s;}
.day-row.active .day-num{background:var(--rouge);color:#fff;border-color:var(--rouge);}
.day-row.completed .day-num{background:var(--sage);color:#fff;border-color:var(--sage);}
.day-info{flex:1;min-width:0;}
.day-title{font-size:0.76rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-cat{font-size:0.6rem;color:var(--muted);margin-top:1px;}
.day-ck{font-size:0.7rem;color:var(--sage);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.lesson-wrap{padding:32px 44px;display:flex;flex-direction:column;gap:20px;max-width:800px;margin:0 auto;}
.l-eye{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--rouge);display:flex;align-items:center;gap:7px;}
.l-eye::before{content:'';display:block;width:16px;height:1px;background:var(--rouge);}
.l-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;line-height:1.1;}
.l-title em{font-style:italic;color:var(--rouge);}
.l-desc{font-size:0.85rem;color:var(--muted);line-height:1.75;max-width:520px;}

/* ── STORY ── */
.story-block{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 2px 14px rgba(23,18,13,0.05);}
.story-top{background:var(--ink);color:#FAFAF8;padding:16px 22px;display:flex;align-items:center;gap:11px;}
.story-av{width:38px;height:38px;border-radius:50%;background:var(--rouge);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.story-who{font-family:'Cormorant Garamond',serif;font-size:1rem;}
.story-sub{font-size:0.65rem;color:rgba(250,250,248,0.45);margin-top:1px;}
.story-scene{padding:20px 22px 14px;border-bottom:1px solid var(--border);}
.scene-lbl{font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.scene-txt{font-family:'Cormorant Garamond',serif;font-size:1.02rem;line-height:1.9;font-style:italic;}
.hl{color:var(--rouge);font-style:normal;font-weight:600;cursor:help;border-bottom:1px dashed var(--rouge);}
.dlg-line{display:flex;gap:11px;padding:12px 22px;border-bottom:1px solid var(--border);transition:background 0.12s;}
.dlg-line:last-child{border-bottom:none;}
.dlg-line:hover{background:#FAFAF5;}
.dlg-who{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);width:68px;flex-shrink:0;padding-top:2px;}
.dlg-fr{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.02rem;color:var(--ink);margin-bottom:3px;line-height:1.5;}
.dlg-de{font-size:0.76rem;color:var(--muted);line-height:1.5;}
.dlg-note{font-size:0.73rem;color:var(--gold);margin-top:5px;line-height:1.5;}

/* ── TABS ── */
.tabs{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--panel);}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.68rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:4px;}
.tab.active{background:var(--card);color:var(--ink);font-weight:500;box-shadow:0 1px 4px rgba(23,18,13,0.08);}
.tab:hover:not(.active){color:var(--ink);}

/* ── EXERCISES ── */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow 0.2s;}
.ex-card:hover{box-shadow:0 4px 18px rgba(23,18,13,0.07);}
.ex-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;}
.ex-badge{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:3px;flex-shrink:0;margin-top:2px;}
.ex-badge.vok{background:rgba(107,82,168,0.1);color:var(--violet);}
.ex-badge.gram{background:rgba(58,122,82,0.1);color:var(--sage);}
.ex-badge.schreib{background:rgba(184,50,30,0.1);color:var(--rouge);}
.ex-badge.mcq{background:rgba(201,147,58,0.1);color:var(--gold);}
.ex-q{font-family:'Cormorant Garamond',serif;font-size:1.02rem;line-height:1.5;}
.ex-body{padding:16px 18px;}
.mcq-opts{display:flex;flex-direction:column;gap:8px;}
.mcq-o{display:flex;align-items:center;gap:9px;padding:10px 13px;border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all 0.15s;font-size:0.86rem;}
.mcq-o:hover{border-color:var(--ink);background:#FAFAF5;}
.mcq-o.correct{border-color:var(--sage);background:rgba(58,122,82,0.07);color:var(--sage);}
.mcq-o.wrong{border-color:var(--rouge);background:rgba(184,50,30,0.07);color:var(--rouge);}
.mcq-o.selected{border-color:var(--ink);background:var(--ink);color:#FAFAF8;}
.mcq-letter{width:22px;height:22px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:0.68rem;flex-shrink:0;}
.fill-sent{font-family:'Cormorant Garamond',serif;font-size:1.08rem;line-height:2.5;}
.blank{border:none;border-bottom:2px solid var(--ink);background:transparent;font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--rouge);outline:none;width:120px;text-align:center;padding:0 4px;}
.blank.ok{border-color:var(--sage);color:var(--sage);}
.blank.nok{border-color:var(--rouge);}
.write-prompt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.98rem;color:var(--muted);margin-bottom:11px;line-height:1.7;}
.write-ta{width:100%;border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:0.86rem;color:var(--ink);background:var(--panel);outline:none;resize:vertical;min-height:84px;line-height:1.65;}
.fb{margin-top:13px;padding:13px 15px;border-radius:6px;border:1px solid var(--border);background:var(--panel);font-size:0.84rem;line-height:1.75;display:none;animation:fadeUp 0.35s ease;}
.fb.show{display:block;}
.fb.loading{display:flex;align-items:center;gap:10px;color:var(--muted);}
.fb-lbl{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:500;}
.btn{border:none;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:4px;letter-spacing:0.09em;text-transform:uppercase;transition:all 0.18s;}
.btn-check{background:var(--ink);color:#FAFAF8;font-size:0.7rem;padding:8px 18px;margin-top:12px;}
.btn-check:hover{background:var(--rouge);}
.btn-check:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
.btn-next{background:var(--rouge);color:#fff;font-size:0.73rem;padding:11px 24px;display:inline-flex;align-items:center;gap:7px;margin-top:5px;}
.btn-next:hover{background:#8f2010;transform:translateY(-1px);}

/* ── SPEAKING ── */
.speak-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.speak-top{background:linear-gradient(135deg,#1A0F0A,#2D1810);color:#FAFAF8;padding:18px 22px;}
.speak-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:300;margin-bottom:3px;}
.speak-sub{font-size:0.74rem;color:rgba(250,250,248,0.5);line-height:1.6;}
.speak-body{padding:20px;}
.speak-prompt-box{background:var(--panel);border-radius:8px;padding:15px 17px;margin-bottom:14px;border-left:3px solid var(--rouge);}
.speak-prompt-lbl{font-size:0.57rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--rouge);margin-bottom:5px;}
.speak-prompt-txt{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.02rem;line-height:1.7;}
.speak-prompt-de{font-size:0.74rem;color:var(--muted);margin-top:4px;line-height:1.5;}
.mic-area{display:flex;flex-direction:column;align-items:center;gap:13px;padding:14px 0;}
.mic-btn{
  width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;
  background:var(--rouge);color:#fff;font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;box-shadow:0 4px 18px rgba(184,50,30,0.3);
}
.mic-btn:hover{transform:scale(1.05);}
.mic-btn.recording{background:#8f2010;animation:pulseMic 1.2s infinite;}
@keyframes pulseMic{0%,100%{box-shadow:0 4px 18px rgba(184,50,30,0.3)}50%{box-shadow:0 4px 36px rgba(184,50,30,0.7),0 0 0 10px rgba(184,50,30,0.1)}}
.mic-status{font-size:0.7rem;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;text-align:center;}
.transcript-box{width:100%;min-height:52px;background:var(--panel);border-radius:6px;padding:11px 13px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.98rem;line-height:1.65;color:var(--ink);border:1px solid var(--border);margin-bottom:4px;}
.transcript-ph{color:var(--muted);font-size:0.82rem;font-style:normal;}
.voice-indicator{display:flex;align-items:center;gap:7px;font-size:0.7rem;color:var(--muted);margin-bottom:10px;min-height:20px;}
.voice-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);animation:vpulse 1.5s infinite;display:none;}
.voice-dot.active{display:block;}
@keyframes vpulse{0%,100%{opacity:1}50%{opacity:0.3}}
.speak-fb{margin-top:12px;padding:13px 15px;border-radius:6px;background:var(--panel2);border:1px solid rgba(58,122,82,0.2);font-size:0.84rem;line-height:1.75;display:none;animation:fadeUp 0.35s ease;}
.speak-fb.show{display:block;}
.speak-fb-lbl{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage);margin-bottom:6px;font-weight:500;}

/* ── VOCAB ── */
.vok-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;}
.vok-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:13px 15px;cursor:pointer;user-select:none;transition:all 0.15s;}
.vok-card:hover{border-color:var(--violet);transform:translateY(-1px);}
.vok-fr{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--rouge);margin-bottom:3px;}
.vok-ex{font-size:0.72rem;color:var(--muted);line-height:1.5;}
.vok-de{display:none;font-size:0.84rem;color:var(--ink);font-weight:400;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.vok-hint{font-size:0.57rem;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.vok-card.flipped .vok-de{display:block;}

/* ── COMPLETION ── */
.completion{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;}
.comp-emoji{font-size:3rem;margin-bottom:14px;}
.comp-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:7px;}
.comp-title em{font-style:italic;color:var(--rouge);}
.comp-sub{color:var(--muted);font-size:0.85rem;line-height:1.8;margin-bottom:22px;}

/* ── UTILS ── */
.dots{display:flex;gap:4px;}
.dots span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.1s infinite;}
.dots span:nth-child(2){animation-delay:0.18s;}
.dots span:nth-child(3){animation-delay:0.36s;}
.tt{position:fixed;background:var(--ink);color:#FAFAF8;padding:6px 10px;border-radius:4px;font-size:0.73rem;pointer-events:none;z-index:9998;display:none;max-width:210px;line-height:1.5;box-shadow:0 4px 14px rgba(0,0,0,0.2);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@media(max-width:700px){.sidebar{display:none;}.lesson-wrap{padding:20px 16px;}}
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="pw-screen">
  <div class="pw-logo">🇫🇷 Le <em>Maître</em></div>
  <div class="pw-sub">Ihr persönlicher Französischkurs</div>
  <div class="pw-form">
    <input class="pw-input" type="password" id="pw-input" placeholder="Passwort eingeben" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Einloggen</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-shell">
  <div class="topbar">
    <div class="logo">🇫🇷 Le <em>Maître</em></div>
    <div class="top-mid">
      <div class="prog-lbl"><span id="prog-lbl">Tag 1 von 30</span><span id="prog-pct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="xp-pill">✦ <b id="xp-n">0</b> XP</div>
      <div class="streak" id="streak-pill">🔥 0 Tage</div>
    </div>
  </div>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="tt" id="tt"></div>

<script>
// ══════════════════════════════════════════════
// PASSWORD
// ══════════════════════════════════════════════
var SESSION_PW = '';

async function checkPw() {
  var val = document.getElementById('pw-input').value.trim();
  if (!val) return;
  var err = document.getElementById('pw-error');
  err.textContent = '';

  // Test the password against the Netlify function
  try {
    var res = await fetch('/api/ai', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: val, prompt: 'Réponds uniquement: "OK"'})
    });
    if (res.status === 401) {
      err.textContent = 'Falsches Passwort. Bitte erneut versuchen.';
      document.getElementById('pw-input').value = '';
      return;
    }
    if (!res.ok) {
      err.textContent = 'Verbindungsfehler. Bitte erneut versuchen.';
      return;
    }
    SESSION_PW = val;
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('app-shell').classList.add('visible');
    initApp();
  } catch(e) {
    err.textContent = 'Netzwerkfehler. Bitte Internetverbindung prüfen.';
  }
}

// ══════════════════════════════════════════════
// CURRICULUM
// ══════════════════════════════════════════════
var DAYS = [
  {id:1,icon:'📷',title:"L'œil du photographe",cat:'photo',catLabel:'Photographie',level:'B2',
   desc:'Die Sprache der Fotografie — Komposition, Licht und den Augenblick beschreiben.',
   scene:'<span class="hl" data-t="Diane Arbus (1923–1971) — Fotografin, bekannt für eindringliche Porträts.">Diane Arbus</span> sagte: „Ein Foto ist ein Geheimnis über ein Geheimnis." Im <span class="hl" data-t="Jeu de Paume — Nationales Fotomuseum im Tuilerien-Garten, Paris.">Jeu de Paume</span> eröffnet eine Retrospektive.',
   character:{name:'Isabelle',role:'Galerie-Kuratorin, Paris',emoji:'👩‍🎨'},
   dialogue:[
    {who:'Visiteur',fr:"Cette exposition est saisissante. Comment avez-vous choisi les œuvres ?",de:'Diese Ausstellung ist ergreifend. Wie haben Sie die Werke ausgewählt?',note:'💡 "saisissant(e)" = ergreifend — stärker als "impressionnant"'},
    {who:'Isabelle',fr:"Nous cherchions des images qui interrogent le regard plutôt que de simplement documenter.",de:'Wir suchten Bilder, die den Blick befragen, statt nur zu dokumentieren.',note:'💡 "interroger le regard" = den Blick befragen — typisch Kunstkritik'},
    {who:'Visiteur',fr:"La lumière rasante crée une texture presque tactile.",de:'Das Streiflicht erzeugt eine beinahe haptische Textur.',note:'💡 "lumière rasante" = Streiflicht'},
    {who:'Isabelle',fr:"Le photographe joue avec la tension entre le plein et le vide, le dit et le non-dit.",de:'Er spielt mit der Spannung zwischen Fülle und Leere, Gesagtem und Unausgesagten.',note:'💡 "le non-dit" = das Unausgesprochene — wichtiges ästhetisches Konzept'},
   ],

      S.xp = saved.xp||0;

    }

}

}

function updateProg(){

  var pct = Math.round(done/30*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';

function buildLesson(){
  var d=DAYS[S.current], ds=S.days[S.current];
  var tabLabels = {story:'📖 Geschichte',vokabeln:'📚 Vokabeln',uebungen:'✏️ Übungen',sprechen:'🎙️ Sprechen'};
  var tabs = Object.keys(tabLabels).map(function(t){
    return '<button class="tab'+(S.tab===t?' active':'')+'" onclick="switchTab(\''+t+'\')">'+tabLabels[t]+'</button>';
  }).join('');
  var panel = '';
  if(S.tab==='story') panel=buildStory(d);
  else if(S.tab==='vokabeln') panel=buildVocab(d);
  else if(S.tab==='uebungen') panel=buildExs(d,ds);
  else if(S.tab==='sprechen') panel=buildSpeak(d);
  var allDone = d.exercises.every(function(e){return ds.done[e.id];});
  var bottom = '';
  if(allDone&&!ds.completed&&S.tab==='uebungen')
    bottom='<div style="text-align:center;padding:6px 0"><button class="btn btn-next" onclick="completeDay()">Tag abschließen &amp; weiter →</button></div>';
  else if(ds.completed&&S.current<29)
    bottom='<div style="text-align:center;padding:6px 0"><button class="btn btn-next" onclick="selDay('+(S.current+1)+')">Nächste Lektion: Tag '+(S.current+2)+' →</button></div>';
  else if(ds.completed&&S.current===29)
    bottom=buildFinal();

    '<h1 class="l-title">'+d.icon+' '+d.title+'</h1>'+
    '<p class="l-desc">'+d.desc+'</p>'+

function buildStory(d){

  }).join('');

    '<div class="vok-grid">'+cards+'</div>';
}

function buildExs(d,ds){ return d.exercises.map(function(ex){return buildEx(ex,ds);}).join(''); }

function buildEx(ex,ds){
  var done = ds.done[ex.id];
  var bCls = {mcq:'mcq',fill:'gram',write:'schreib',vok:'vok',gram:'gram',schreib:'schreib'}[ex.badge]||'mcq';
  var bLbl = {mcq:'Multiple Choice',fill:'Lückentext',write:'Schreiben',vok:'Vokabular',gram:'Grammatik',schreib:'Schreiben'}[ex.badge]||'Übung';
  var body = '';
  if(ex.type==='mcq'){
    var letters=['A','B','C','D'];
    var opts = (ex.opts||[]).map(function(o,i){
      var c='';
      if(done){c=i===ex.ans?' correct':ds.mcqPick[ex.id]===i?' wrong':'';}
      else if(ds.mcqPick[ex.id]===i) c=' selected';
      return '<div class="mcq-o'+c+'" onclick="pickMCQ(\''+ex.id+'\','+i+','+ex.ans+')" data-ex="'+ex.id+'" data-i="'+i+'">'+
        '<div class="mcq-letter">'+letters[i]+'</div>'+o+'</div>';
    }).join('');
    body='<div class="mcq-opts">'+opts+'</div>'+
      '<div class="fb'+(done?' show':'')+'" id="fb-'+ex.id+'">'+(done?'<div class="fb-lbl">✦ Erklärung</div>'+ex.expl:'')+'</div>';
  } else if(ex.type==='fill'){
    var sent='',bi=0;
    (ex.parts||[]).forEach(function(p){
      sent+=p;
      if(bi<ex.blanks.length){
        var v=done?ex.blanks[bi]:'';
        var bc=done?' ok':'';
        sent+='<input class="blank'+bc+'" id="bl-'+ex.id+'-'+bi+'" type="text" placeholder="···" value="'+v+'"'+(done?' disabled':'')+' onkeydown="if(event.key===\'Enter\')checkFill(\''+ex.id+'\')">';
        bi++;
      }
    });
    body='<div class="fill-sent">'+sent+'</div>'+
      '<div style="font-size:0.72rem;color:var(--muted);margin-top:7px">💡 Hinweis: '+ex.hint+'</div>'+
      (!done?'<button class="btn btn-check" onclick="checkFill(\''+ex.id+'\')">Antwort prüfen</button>':'')+
      '<div class="fb'+(done?' show':'')+'" id="fb-'+ex.id+'">'+(done?'<div class="fb-lbl">✦ Erklärung</div>'+ex.expl:'')+'</div>';
  } else if(ex.type==='write'){
    var fbC = done&&typeof done==='string'?done:'';
    body='<div class="write-prompt">'+ex.prompt+'</div>'+
      '<textarea class="write-ta" id="wr-'+ex.id+'" placeholder="Schreiben Sie auf Französisch…"'+(done?' disabled':'')+' rows="4"></textarea>'+
      (!done?'<button class="btn btn-check" onclick="submitWrite(\''+ex.id+'\')">✦ KI-Feedback erhalten</button>':'')+
      '<div class="fb'+(done&&typeof done==='string'?' show':'')+'" id="fb-'+ex.id+'">'+fbC+'</div>';
  }
  return '<div class="ex-card" id="card-'+ex.id+'">'+
    '<div class="ex-head"><span class="ex-badge '+bCls+'">'+bLbl+'</span>'+
    '<div class="ex-q">'+ex.q+'</div></div>'+
    '<div class="ex-body">'+body+'</div></div>';
}

    '</div></div></div>';
}

var recognition=null, transcript='', isRec=false;

function toggleRec(){ isRec ? stopRec() : startRec(); }

function startRec(){
  var SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Spracherkennung nicht unterstützt. Bitte Chrome oder Edge nutzen.'); return; }
  recognition = new SR();
  recognition.lang='fr-FR'; recognition.continuous=true; recognition.interimResults=true;
  recognition.onresult = function(e){
    var fin='',int='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) fin+=e.results[i][0].transcript;
      else int+=e.results[i][0].transcript;
    }
    transcript+=fin;
    var tb=document.getElementById('transcript');
    if(tb) tb.innerHTML = (transcript+int)||'<span class="transcript-ph">Sprechen Sie…</span>';
  };
  recognition.onerror = function(e){ stopRec(); if(e.error==='not-allowed') alert('Bitte Mikrofonzugriff erlauben.'); };
  recognition.start(); isRec=true;
  var btn=document.getElementById('mic-btn'), st=document.getElementById('mic-status');
  if(btn) btn.classList.add('recording');
  if(st) st.textContent='Aufnahme läuft… (klicken zum Stoppen)';
  var gb=document.getElementById('get-fb-btn'); if(gb) gb.style.display='none';
}

function stopRec(){
  if(recognition) recognition.stop(); isRec=false;
  var btn=document.getElementById('mic-btn'), st=document.getElementById('mic-status');
  if(btn) btn.classList.remove('recording');
  if(st) st.textContent='Aufnahme beendet';
  if(transcript.trim()){ var gb=document.getElementById('get-fb-btn'); if(gb) gb.style.display='inline-block'; }
}

function clearSpk(){
  if(recognition) recognition.stop(); isRec=false; transcript='';
  var tb=document.getElementById('transcript'); if(tb) tb.innerHTML='<span class="transcript-ph">Ihr gesprochener Text erscheint hier…</span>';
  var fb=document.getElementById('speak-fb'); if(fb) fb.classList.remove('show');
  var btn=document.getElementById('mic-btn'); if(btn) btn.classList.remove('recording');
  var st=document.getElementById('mic-status'); if(st) st.textContent='Klicken zum Aufnehmen';
  var gb=document.getElementById('get-fb-btn'); if(gb) gb.style.display='none';
}

async function getSpkFb(){
  var text=transcript.trim(); if(!text||text.length<5) return;
  var d=DAYS[S.current];
  var gb=document.getElementById('get-fb-btn'); if(gb) gb.disabled=true;
  var fb=document.getElementById('speak-fb'), fbt=document.getElementById('speak-fb-txt');
  fb.classList.add('show');
  fbt.innerHTML='<div style="display:flex;align-items:center;gap:8px;color:var(--muted)"><div class="dots"><span></span><span></span><span></span></div> Le Maître écoute…</div>';

  var prompt='Tu es Le Maître, tutrice de français raffinée avec l\'accent d\'une Parisienne cultivée. Tu réponds UNIQUEMENT en français.\n\nL\'étudiante vient de parler. Sujet: "'+d.speak.prompt+'"\n\nElle a dit:\n"""\n'+text+'\n"""\n\nDonne un feedback chaleureux et précis:\n1. Une phrase d\'encouragement (citer quelque chose qu\'elle a bien dit).\n2. "Ce qui est réussi :" — 1-2 points positifs spécifiques.\n3. "Pour aller plus loin :" — 1-2 suggestions avec reformulations élégantes en italique.\n4. Une phrase de clôture chaleureuse.\n\nMax 160 mots. Uniquement en français.';

  try{
    var res = await fetch('/api/ai', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: SESSION_PW, prompt: prompt})
    });
    var data = await res.json();
    var reply = data.text || 'Désolée, réessayez.';
    fbt.innerHTML='<div style="line-height:1.75;font-size:0.84rem">'+reply.replace(/\n/g,'<br>')+'</div>';
    speakFb(reply); addXP(15);
  } catch(err){
    fbt.innerHTML='<span style="color:var(--rouge)">Verbindungsfehler. Bitte erneut versuchen.</span>';
  }
  if(gb) gb.disabled=false;
}

function speakFb(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang='fr-FR'; u.rate=0.92; u.pitch=1.08;
  var vs = window.speechSynthesis.getVoices().filter(function(v){return v.lang.startsWith('fr');});
  var fv = vs.find(function(v){var n=v.name.toLowerCase();return n.includes('amélie')||n.includes('marie')||n.includes('female')||n.includes('femme');})||vs[0];
  if(fv) u.voice=fv;
  var dot=document.getElementById('voice-dot'), vst=document.getElementById('voice-status');
  if(dot) dot.classList.add('active'); if(vst) vst.textContent='Le Maître parle…';
  u.onend=function(){ if(dot) dot.classList.remove('active'); if(vst) vst.textContent=''; };
  window.speechSynthesis.speak(u);
}
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};

function pickMCQ(exId,idx,correct){
  var ds=S.days[S.current]; if(ds.done[exId]) return;
  ds.mcqPick[exId]=idx; ds.done[exId]=true; if(idx===correct) addXP(10);
  var ex=DAYS[S.current].exercises.find(function(e){return e.id===exId;});
  document.querySelectorAll('[data-ex="'+exId+'"]').forEach(function(o){
    var i=parseInt(o.dataset.i);
    o.className='mcq-o'+(i===correct?' correct':ds.mcqPick[exId]===i?' wrong':'');
    o.onclick=null;
  });
  var fb=document.getElementById('fb-'+exId);
  if(fb){fb.innerHTML='<div class="fb-lbl">✦ Erklärung</div>'+ex.expl;fb.classList.add('show');}
  checkAllDone(); saveState();
}

function checkFill(exId){
  var ex=DAYS[S.current].exercises.find(function(e){return e.id===exId;}), ds=S.days[S.current];
  var ok=true;
  ex.blanks.forEach(function(ans,i){
    var inp=document.getElementById('bl-'+exId+'-'+i); if(!inp) return;
    var c=inp.value.trim().toLowerCase()===ans.toLowerCase();
    if(!c){ok=false;inp.value=ans;}
    inp.className='blank'+(c?' ok':' nok'); inp.disabled=true;
  });
  ds.done[exId]=true; addXP(ok?10:5);
  var fb=document.getElementById('fb-'+exId);
  if(fb){fb.innerHTML='<div class="fb-lbl">✦ Erklärung</div>'+ex.expl;fb.classList.add('show');}
  var btn=document.querySelector('#card-'+exId+' .btn-check'); if(btn) btn.remove();
  checkAllDone(); saveState();
}

async function submitWrite(exId){
  var ex=DAYS[S.current].exercises.find(function(e){return e.id===exId;}), ds=S.days[S.current];
  var ta=document.getElementById('wr-'+exId); var text=ta?ta.value.trim():'';
  if(!text||text.length<10){if(ta) ta.style.borderColor='var(--rouge)'; return;}
  var btn=document.querySelector('#card-'+exId+' .btn-check'); if(btn) btn.disabled=true;
  var fb=document.getElementById('fb-'+exId);
  fb.className='fb show loading';
  fb.innerHTML='<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="dots"><span></span><span></span><span></span></div> Le Maître liest Ihren Text…</div>';

  var prompt='Tu es Le Maître, tutrice de français experte et bienveillante pour une apprenante germanophone (B2-C2).\n\nLeçon: "'+DAYS[S.current].title+'"\nExercice: "'+ex.q+'"\nCritères: '+(ex.rubric||'qualité, grammaire, vocabulaire')+'\n\nTexte:\n"""\n'+text+'\n"""\n\nFeedback (mélange naturel français/allemand):\n1. Note: X/10\n2. "Points forts:" — 1-2 points avec citation\n3. "À améliorer:" — 1-2 corrections avec reformulation en italique\n4. Phrase motivante finale\n\nMax 180 mots. Bienveillant et précis, niveau C1-C2.';

  try{
    var res = await fetch('/api/ai', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: SESSION_PW, prompt: prompt})
    });
    var data = await res.json();
    var reply = data.text || 'Feedback nicht verfügbar.';
    fb.className='fb show';
    fb.innerHTML='<div class="fb-lbl">✦ Feedback von Le Maître</div><div style="line-height:1.75">'+reply.replace(/\n/g,'<br>')+'</div>';
    ds.done[exId]=fb.innerHTML; if(ta) ta.disabled=true; if(btn) btn.remove();
    addXP(20); checkAllDone(); saveState();
  } catch(err){
    fb.className='fb show';
    fb.innerHTML='<div style="color:var(--rouge)">Verbindungsfehler. Bitte erneut versuchen.</div>';
    if(btn) btn.disabled=false;
  }
}

function checkAllDone(){
  var d=DAYS[S.current], ds=S.days[S.current];
  if(d.exercises.every(function(e){return ds.done[e.id];})&&!ds.completed&&S.tab==='uebungen') renderContent();
}

function completeDay(){
  var i=S.current; S.days[i].completed=true; S.streak++; addXP(50);
  if(i+1<30) S.days[i+1].unlocked=true;
  renderSidebar(); updateProg(); renderContent();
  document.getElementById('content').scrollTop=0; saveState();
}

function buildFinal(){
  return '<div class="completion"><div class="comp-emoji">🎉</div>'+
    '<h2 class="comp-title">Bravo ! <em>Vous avez réussi !</em></h2>'+
    '<p class="comp-sub">30 Tage — Kunst, Fotografie, Essen, Reisen, Politik und Sprache.<br>'+
    'Von B2 zu C2. <em>Continuez comme ça !</em><br><br>'+
    'Gesamt-XP: <strong>'+S.xp+'</strong> ✦</p>'+
    '<button class="btn btn-next" onclick="restartAll()">↺ Von vorne beginnen</button></div>';
}

function restartAll(){
  S.xp=0; S.streak=0; S.current=0; S.tab='story'; transcript='';
  S.days=DAYS.map(function(d,i){return{unlocked:i===0,completed:false,done:{},mcqPick:{}};});
  document.getElementById('xp-n').textContent='0';
  renderSidebar(); updateProg(); renderContent(); saveState();
}

// ══════════════════════════════════════════════
// TOOLTIPS
// ══════════════════════════════════════════════
function attachTT(){
  document.querySelectorAll('.hl').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      var t=document.getElementById('tt'); t.textContent=el.dataset.t; t.style.display='block';
      t.style.left=(e.pageX+10)+'px'; t.style.top=(e.pageY-6)+'px';
    });
    el.addEventListener('mousemove',function(e){
      var t=document.getElementById('tt'); t.style.left=(e.pageX+10)+'px'; t.style.top=(e.pageY-6)+'px';
    });
    el.addEventListener('mouseleave',function(){ document.getElementById('tt').style.display='none'; });
  });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function initApp(){
  loadState();
  renderSidebar(); renderContent(); updateProg();
}
</script>
